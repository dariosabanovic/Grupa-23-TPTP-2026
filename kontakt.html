<!DOCTYPE html>
<html lang="bs">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NBA Historija - Kontakt</title>

 <link rel="stylesheet" href="css/tptpstil.css">

</head>

<body>

<header class="glavni-header">
    <h1 class="logo">NBA HISTORIJA</h1>

    <nav class="menu">
        <a href="index.html">Početna</a>
        <a href="sadrzaj.html">Sadržaj</a>
        <a href="kontakt.html">Kontakt</a>
        
    </nav>
</header>
<main>

<section>

    <h2>Pošalji upit</h2>

    <form id="kontaktForma" novalidate>

        <label for="ime">Ime</label>

        <input type="text" id="ime">

        <span id="imeError"></span>

           <!--AI Chat GBT -->

        <label for="prezime">Prezime</label>

        <input type="text" id="prezime">

        <span id="prezimeError"></span>

        <label for="email">Email</label>

        <input type="text" id="email">

        <span id="emailError"></span>

        <label for="telefon">Telefon</label>

        <input type="text" id="telefon">

        <span id="telefonError"></span>

        <label for="tema">Tema upita</label>

        <select id="tema">

            <option value="">
                Odaberi temu
            </option>

            <!--AI ChatGBT -->

            <option value="legende">
                NBA legende
            </option>

            <option value="rekordi">
                NBA rekordi
            </option>

            <option value="timovi">
                NBA timovi
            </option>

        </select>

        <span id="temaError"></span>

        <label for="poruka">Poruka</label>

        <textarea id="poruka"></textarea>

        <span id="porukaError"></span>

        <button type="submit">
            Pošalji
        </button>

        <button type="button">
            Reset
        </button>

        <p id="success"></p>

    </form>

</section>

</main>

<footer>

<p>
© 2026 NBA Historija |
Autori: Sabanovic Dario,
David Tanaskovic,
Dino Lisic
</p>

</footer>

<script src="js/tptpskripte.js"></script>

</body>
</html>
